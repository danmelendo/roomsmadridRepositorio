# ─────────────────────────────────────────────────────────────────────────────
# nginx sirviendo la SPA ESTÁTICA  ·  reservas.roomsmadrid.es
#
# nginx sirve directamente los archivos de /var/www/roomsmadrid (el contenido de
# dist/). El objetivo de la caché: que el cliente vea SIEMPRE la última versión
# tras cada despliegue, sin borrar caché a mano.
#
#   • /assets/* (JS/CSS con hash) → cache 1 año, inmutable. Como el nombre cambia
#     en cada build, el navegador descarga el nuevo solo cuando hay versión nueva.
#   • index.html → no-store (nunca cachear) → siempre fresco. Como referencia a los
#     assets nuevos, el cliente carga la versión nueva.
#
# Copia este bloque a /etc/nginx/sites-available/, ajusta server_name, y:
#     sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name reservas.roomsmadrid.es;

    root /var/www/roomsmadrid;     # contenido de dist/
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Assets con hash → cache larga e inmutable ──
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Imágenes/marca SIN hash (brand/, imagenes/, favicon) → cache 1 día con
    #    revalidación. Si subes imágenes nuevas con el mismo nombre, se refrescan. ──
    location ~* \.(?:png|jpe?g|webp|svg|ico|gif|woff2?)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    }

    # ── SPA: cualquier ruta (/reservar, /login, /calendar…) sirve index.html.
    #    index.html NUNCA se cachea → el cliente siempre recibe la última versión. ──
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }
}

# NOTA HTTPS: con certbot/Let's Encrypt, certbot añade un bloque server en :443.
# Asegúrate de que esos mismos `location` están también en el bloque :443
# (o pon la lógica en un archivo y haz `include`).
#
# NOTA CDN: si hay Cloudflare u otro CDN por delante, purga su caché tras
# desplegar (o replica allí: no cachear HTML, cachear /assets un año).
